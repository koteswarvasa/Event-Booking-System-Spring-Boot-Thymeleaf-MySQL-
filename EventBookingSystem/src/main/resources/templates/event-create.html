<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h2>Create Event 🎤</h2>

    <form th:action="@{/events/save}" th:object="${event}" method="post">

        <input type="text" th:field="*{title}" class="form-control mb-2" placeholder="Title" required>

        <input type="text" th:field="*{location}" class="form-control mb-2" placeholder="Location" required>

        <input type="date" th:field="*{date}" class="form-control mb-2" required>

        <input type="number" th:field="*{price}" class="form-control mb-2" placeholder="Price" required>

        <textarea th:field="*{description}" class="form-control mb-2" placeholder="Description"></textarea>

        <button class="btn btn-primary">Create Event</button>

    </form>
</div>

</body>
</html>
