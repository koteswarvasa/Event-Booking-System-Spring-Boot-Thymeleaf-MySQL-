<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2>All Events 🎤</h2>

    <a href="/events/create" class="btn btn-success mb-3">+ Create Event</a>
    
    <form action="/events/search" method="get" class="mb-3 d-flex">

    <input type="text" name="keyword" class="form-control me-2" placeholder="Search events...">

    <button class="btn btn-primary">Search</button>

</form>


<form action="/events/filter" method="get" class="row g-2 mb-3">

    <div class="col-md-4">
        <input type="text" name="location" class="form-control" placeholder="Location">
    </div>

    <div class="col-md-4">
        <input type="date" name="date" class="form-control">
    </div>

    <div class="col-md-4">
        <button class="btn btn-success w-100">Filter</button>
    </div>

</form>

    <div class="row">

        <div class="col-md-4 mb-3" th:each="event : ${events}">
            <div class="card p-3 shadow">
                <h5 th:text="${event.title}">Title</h5>
                <p th:text="${event.location}">Location</p>
                <p th:text="${event.date}">Date</p>
                <p>₹ <span th:text="${event.price}"></span></p>

                <a th:href="@{'/events/' + ${event.id}}" class="btn btn-primary btn-sm">
                    View Details
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
