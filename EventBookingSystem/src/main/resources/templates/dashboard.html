<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Dashboard | Event Booking</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background-color: #f5f7fa;
}

.card {
	border-radius: 15px;
	transition: 0.3s;
}

.card:hover {
	transform: scale(1.03);
}

.welcome-box {
	background: linear-gradient(to right, #667eea, #764ba2);
	color: white;
	border-radius: 15px;
	padding: 20px;
}
</style>
</head>

<body>

	<!-- ✅ NAVBAR -->
	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container mt-4">

		<!-- 🔹 WELCOME SECTION -->
		<div class="welcome-box mb-4">
			<h2>
				Welcome, <span th:text="${#authentication != null ? #authentication.name : 'Guest'}"></span> 👋
			</h2>
			<p>Explore events and book your tickets easily</p>
		</div>

		<!-- 🔹 QUICK ACTION CARDS -->
		<div class="row g-4">

			<!-- EVENTS -->
			<div class="col-md-4">
				<div class="card shadow p-4 text-center">
					<h4>🎤 Events</h4>
					<p>Browse all available events</p>
					<a href="/events" class="btn btn-primary">View Events</a>
				</div>
			</div>

			<!-- BOOKINGS -->
			<div class="col-md-4">
				<div class="card shadow p-4 text-center">
					<h4>🎟️ My Bookings</h4>
					<p>Check your booked tickets</p>
					<a href="/bookings" class="btn btn-success">View Bookings</a>
				</div>
			</div>

			<!-- PROFILE -->
			<div class="col-md-4">
				<div class="card shadow p-4 text-center">
					<h4>👤 Profile</h4>
					<p>Manage your account details</p>
					<a href="/profile" class="btn btn-dark">View Profile</a>
				</div>
			</div>

		</div>

		<!-- 🔹 EXTRA SECTION (OPTIONAL - LATER) -->
		<div class="mt-5">
			<h4>🔥 Upcoming Events</h4>

			<div class="row g-3 mt-2">

				<div class="col-md-4" th:each="event : ${events}">
					<div class="card shadow-sm p-3">
						<h5 th:text="${event.title}">Event Name</h5>
						<p th:text="${event.location}">Location</p>
						<p>
							<b th:text="${event.date}">Date</b>
						</p>
						<a th:href="@{'/events/' + ${event.id}}"
							class="btn btn-outline-primary btn-sm"> View Details </a>
					</div>
				</div>

			</div>
		</div>

	</div>

</body>
</html>
