<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 th:text="${event.title}"></h2>

    <p><b>Location:</b> <span th:text="${event.location}"></span></p>
    <p><b>Date:</b> <span th:text="${event.date}"></span></p>
    <p><b>Price:</b> ₹ <span th:text="${event.price}"></span></p>
    <p th:text="${event.description}"></p>

    <a href="/events" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
